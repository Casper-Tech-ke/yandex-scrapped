services:
  - type: web
    name: casper-scraper
    runtime: node
    plan: starter
    buildCommand: |
      npm install -g pnpm &&
      pnpm install &&
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /home/render/yt-dlp &&
      chmod +x /home/render/yt-dlp &&
      BASE_PATH=/scraper-ui/ pnpm --filter @workspace/scraper-ui run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: YTDLP_PATH
        value: /home/render/yt-dlp
      - key: SESSION_SECRET
        generateValue: true
