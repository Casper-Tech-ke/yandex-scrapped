<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f1a"/>
  <rect width="1200" height="630" fill="url(#og-bg)" opacity="0.6"/>

  <!-- Grid pattern cards — left cluster -->
  <rect x="60" y="80" width="180" height="130" rx="14" fill="#00d4ff" opacity="0.15"/>
  <rect x="60" y="225" width="180" height="200" rx="14" fill="#00d4ff" opacity="0.1"/>
  <rect x="60" y="440" width="180" height="110" rx="14" fill="#00d4ff" opacity="0.08"/>
  <rect x="256" y="80" width="180" height="200" rx="14" fill="#00d4ff" opacity="0.1"/>
  <rect x="256" y="296" width="180" height="150" rx="14" fill="#00d4ff" opacity="0.12"/>
  <rect x="256" y="462" width="180" height="88" rx="14" fill="#00d4ff" opacity="0.07"/>

  <!-- Grid pattern cards — right cluster -->
  <rect x="820" y="80" width="180" height="150" rx="14" fill="#00d4ff" opacity="0.08"/>
  <rect x="820" y="246" width="180" height="110" rx="14" fill="#00d4ff" opacity="0.12"/>
  <rect x="820" y="372" width="180" height="180" rx="14" fill="#00d4ff" opacity="0.09"/>
  <rect x="1016" y="80" width="124" height="220" rx="14" fill="#00d4ff" opacity="0.1"/>
  <rect x="1016" y="316" width="124" height="160" rx="14" fill="#00d4ff" opacity="0.07"/>

  <!-- Center play button -->
  <circle cx="600" cy="220" r="90" fill="#00d4ff" opacity="0.08"/>
  <circle cx="600" cy="220" r="66" fill="#00d4ff" opacity="0.15"/>
  <circle cx="600" cy="220" r="46" fill="#00d4ff" opacity="0.9"/>
  <polygon points="592,202 592,238 622,220" fill="#0a0f1a"/>

  <!-- Search lens -->
  <circle cx="660" cy="168" r="28" fill="none" stroke="#00d4ff" stroke-width="6" opacity="0.85"/>
  <line x1="680" y1="188" x2="698" y2="206" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

  <!-- Brand name -->
  <text x="600" y="360" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#00d4ff" text-anchor="middle" letter-spacing="-1">CASPER TECH DEVS</text>

  <!-- Tagline -->
  <text x="600" y="420" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#ffffff" text-anchor="middle" opacity="0.65">Image &amp; Video Scraper — Powered by Yandex</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#00d4ff" opacity="0.07"/>
  <text x="600" y="612" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#00d4ff" text-anchor="middle" opacity="0.6">github.com/Casper-Tech-ke  ·  Built by TRABY CASPER, Keith &amp; Silent Wolf</text>

  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#001833" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
